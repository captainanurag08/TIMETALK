{% extends "base.html" %}
{% block content %}

<h1>Weekly Schedule</h1>

{% for day,tasks in data.items() %}

<div class="dayblock">

<h2>{{day}}</h2>

{% if tasks %}

{% for t in tasks %}

<div class="task {{t[5]|lower}}">

<span>{{t[1]}} ({{t[3]}} - {{t[4]}})</span>

<a href="/delete/{{t[0]}}">❌</a>

</div>

{% endfor %}

{% else %}

<p>No tasks</p>

{% endif %}

</div>

{% endfor %}

{% endblock %}
