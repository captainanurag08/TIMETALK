{% extends "base.html" %}
{% block content %}

<h1>Add Task</h1>

<form method="post" class="form">

<input name="title" placeholder="Task title" required>

<select name="day">
<option>Monday</option>
<option>Tuesday</option>
<option>Wednesday</option>
<option>Thursday</option>
<option>Friday</option>
<option>Saturday</option>
<option>Sunday</option>
</select>

<input type="time" name="start" required>
<input type="time" name="end" required>

<label>Priority</label>

<select name="priority">
<option value="Low">Low</option>
<option value="Medium" selected>Medium</option>
<option value="High">High</option>
<option value="Critical">Critical</option>
</select>

<button type="submit">Add Task</button>

</form>

<h2>Auto Weekly Task</h2>

<input id="wtitle" placeholder="Task name">

<input id="wduration" placeholder="Duration in minutes">

<label>Priority</label>

<select id="wpriority">
<option value="Low">Low</option>
<option value="Medium" selected>Medium</option>
<option value="High">High</option>
<option value="Critical">Critical</option>
</select>

<button onclick="weeklyAuto()">Create for week</button>
<h2>Manual Weekly Task</h2>

<input id="mtitle" placeholder="Task name">

<label>Day</label> <select id="mday">

<option>Monday</option>
<option>Tuesday</option>
<option>Wednesday</option>
<option>Thursday</option>
<option>Friday</option>
<option>Saturday</option>
<option>Sunday</option>
</select>

<input type="time" id="mstart">
<input type="time" id="mend">

<label>Priority</label> <select id="mpriority">

<option value="Low">Low</option>
<option value="Medium" selected>Medium</option>
<option value="High">High</option>
<option value="Critical">Critical</option>
</select>

<button onclick="manualWeekly()">Create Weekly Task</button>


{% endblock %}
